aid: google-cloud-compute-engine
name: Google Cloud Compute Engine
description: >-
  Google Cloud Compute Engine delivers virtual machines running in Google's
  innovative data centers and worldwide fiber network. Compute Engine VMs boot
  quickly, come with persistent disk storage, and deliver consistent performance.
  It offers predefined and custom machine types, preemptible VMs, and sole-tenant
  nodes for specialized workloads.
